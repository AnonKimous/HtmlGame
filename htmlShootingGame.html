<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#030712" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>游乐园奖品射击摊</title>
<style>
:root {
--bg: #0b1020;
--text: #fff7ed;
--muted: #fed7aa;
--line: rgba(255,255,255,.18);
--game-ratio: calc(1100 / 650);
}
* { box-sizing: border-box; }
html, body {
width: 100%;
height: 100%;
margin: 0;
overflow: hidden;
overscroll-behavior: none;
touch-action: none;
}
body {
min-height: 100vh;
min-height: 100dvh;
display: grid;
place-items: center;
color: var(--text);
background: #030712;
font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
user-select: none;
-webkit-user-select: none;
}
main {
width: 100vw;
height: 100vh;
height: 100dvh;
display: grid;
place-items: center;
padding: 0;
overflow: hidden;
background:
radial-gradient(circle at 18% 5%, rgba(251,146,60,.24), transparent 30%),
radial-gradient(circle at 80% 8%, rgba(244,63,94,.18), transparent 30%),
linear-gradient(180deg, #111827, #020617);
}
.gameWrap {
position: relative;
width: min(100vw, calc(100vh * 1100 / 650));
width: min(100vw, calc(100dvh * 1100 / 650));
height: min(100vh, calc(100vw * 650 / 1100));
height: min(100dvh, calc(100vw * 650 / 1100));
overflow: hidden;
border: 1px solid var(--line);
border-radius: 22px;
box-shadow: 0 26px 80px rgba(0,0,0,.45);
background: #111827;
}
canvas {
display: block;
width: 100%;
height: 100%;
cursor: none;
touch-action: none;
}
.orientationHint,
.fullscreenGate {
position: fixed;
inset: 0;
display: none;
align-items: center;
justify-content: center;
padding: 24px;
text-align: center;
background: linear-gradient(180deg, rgba(2,6,23,.92), rgba(15,23,42,.96));
color: #fff7ed;
z-index: 20;
}
.fullscreenGate { z-index: 30; }
.orientationCard,
.fullscreenCard {
max-width: 420px;
padding: 22px 20px;
border-radius: 22px;
border: 1px solid rgba(255,255,255,.18);
background: rgba(255,255,255,.08);
box-shadow: 0 18px 48px rgba(0,0,0,.35);
}
.orientationCard h2,
.fullscreenCard h2 {
margin: 0 0 10px;
font-size: 26px;
}
.orientationCard p,
.fullscreenCard p {
margin: 8px 0;
line-height: 1.6;
color: #fed7aa;
}
.fullscreenBtn {
margin-top: 14px;
min-width: 220px;
border: 0;
border-radius: 999px;
padding: 14px 18px;
font-size: 18px;
font-weight: 900;
color: #1f2937;
background: #fff7ed;
box-shadow: 0 10px 24px rgba(0,0,0,.18);
}
@media (pointer: coarse) {
.gameWrap {
border: 0;
border-radius: 0;
box-shadow: none;
}
}
@media (pointer: coarse) and (orientation: portrait) {
.orientationHint {
display: flex;
}
.gameWrap {
width: 100vw;
height: calc(100vw * 650 / 1100);
max-height: 56.25vw;
}
}
@media (pointer: coarse) {
.fullscreenGate.show {
display: flex;
}
}
</style>
</head>
<body>
<main>
<div class="gameWrap">
<canvas id="game" width="1100" height="650" aria-label="游乐园奖品射击摊"></canvas>
</div>
<div class="orientationHint" id="orientationHint" aria-live="polite">
<div class="orientationCard">
<h2>请横屏游玩</h2>
<p>这个游戏只适合横屏。竖屏下不会再强行旋转画面，避免出现歪斜和触控错位。</p>
<p>把手机横过来后即可正常游玩；轻触此页面时也会尝试进入全屏并请求横屏。</p>
</div>
</div>
<div class="fullscreenGate show" id="fullscreenGate" aria-live="polite">
<div class="fullscreenCard">
<h2>进入全屏</h2>
<p>点击下方按钮后，游戏会尝试进入全屏并锁定横屏，尽量把浏览器顶部网页栏隐藏掉。</p>
<p>如果浏览器仍保留网页栏，通常是浏览器限制；把这个页面“添加到主屏幕”后再打开，效果会更接近原生全屏。</p>
<button class="fullscreenBtn" id="fullscreenBtn" type="button">点击全屏开始</button>
</div>
</div>
</main>

  const kingSprites = {};
  function loadKingSprites() {
    for (const [key, src] of Object.entries(KING_SPRITE_SOURCES)) {
      const img = new Image();
      img.onload = () => draw();
      img.src = src;
      kingSprites[key] = img;
    }
  }

  let shopStartRect = null;
  let maxComboRun = 0;
  let lastRun = null;
  let runStartBest = best;
  let previousRunScore = Number(localStorage.getItem(SAVE_PREFIX + "lastScore") || 0);
  let runPreviousScore = previousRunScore;
  let feverTimeExtendActive = false;
  let royalSwingAnim = 0;
  let arcDrag = null;
  let kingCinematic = null;
  let endOverlayAnim = 0;
  let endOverlayInputLock = 0;
  let endShopRect = null;
  let endTitleRect = null;
  const END_OVERLAY_DURATION = 560;
  const END_OVERLAY_INPUT_LOCK = 860;

  function rand(a, b) { return a + Math.random() * (b - a); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function endgameWeaponDensityBoost() { return weapon === "royal" || weapon === "mars" ? ENDGAME_WEAPON_DENSITY_BOOST : 1; }
  function kingHitsNeeded() { return 1 + feverFeastLevel; }
  function scheduleFeverKing(minFrames = 300, maxFrames = 480) {
    kingSpawnedThisFever = false;
    feverKingSpawnTimer = minFrames + Math.floor(Math.random() * (maxFrames - minFrames + 1));
  }

  function saveProgress() {
    localStorage.setItem(SAVE_PREFIX + "tickets", String(tickets));
    localStorage.setItem(SAVE_PREFIX + "debt", String(debt));
    localStorage.setItem(SAVE_PREFIX + "owned", JSON.stringify(owned));
    localStorage.setItem(SAVE_PREFIX + "weapon", weapon);
    localStorage.setItem(SAVE_PREFIX + "music", musicOn ? "on" : "off");
    localStorage.setItem(SAVE_PREFIX + "revealedSecrets", JSON.stringify(revealedSecrets));
    localStorage.setItem(SAVE_PREFIX + "secretNotes", JSON.stringify(secretNotes));
    localStorage.setItem(SAVE_PREFIX + "secretDrawPrice", String(secretDrawPrice));
  }

  function weaponStats() {
    if (weapon === "rapid") return { name: "连发气枪", ammoMax: 14, autoCooldown: 14, noReload: false };
    if (weapon === "arc") return { name: "弧弹枪", ammoMax: 6, autoCooldown: 999, noReload: false };
    if (weapon === "mars") return { name: "火星枪", ammoMax: 8, autoCooldown: 25, noReload: true };
    if (weapon === "royal") return { name: "皇家权杖", ammoMax: 0, autoCooldown: 999, noReload: true };
    return { name: "基础气枪", ammoMax: 8, autoCooldown: 999, noReload: false };
  }

  function setWeapon(id) {
    if (!owned[id] || SHOP_ITEMS[id].type !== "weapon") return;
    weapon = id;
    ammo = weaponStats().ammoMax;
    reloadTimer = 0;
    marsAutoCooldown = 0;
    marsNukeCooldown = 0;
    royalSwingCooldown = 0;
    saveProgress();
    addText(W / 2, 160, "已装备：" + SHOP_ITEMS[id].name, "#bbf7d0");
  }

  function setMerchantSpeech(text, mood = "neutral", life = 180) {
    merchantSpeech = text;
    merchantMood = mood;
    merchantSpeechTimer = life;
  }

  function clearAllProgressData() {
    for (const key of Object.keys(localStorage)) {
      if (key.startsWith(SAVE_PREFIX) || SAVE_PREFIXES_TO_CLEAR_ON_INIT.some(prefix => key.startsWith(prefix))) {
        localStorage.removeItem(key);
      }
    }
    tickets = 0;
    debt = 0;
    best = 0;
    previousRunScore = 0;
    runTickets = 0;
    score = 0;
    combo = 0;
    comboTimer = 0;
    maxComboRun = 0;
    lastRun = null;
    owned = { basic: true };
    weapon = "basic";
    difficulty = "normal";
    revealedSecrets = {};
    secretNotes = [];
    secretDrawPrice = rollSecretPrice();
    secretShopMode = false;
    shopHeadlineClicks = 0;
    draggedSecretNote = null;
    merchantMood = "neutral";
    merchantSpeech = "欢迎，挑战者。这里是国王的小店";
    localStorage.setItem(SAVE_PREFIX + "best", "0");
    localStorage.setItem(SAVE_PREFIX + "lastScore", "0");
    saveProgress();
  }

  function openTitleDialog(kind) {
    if (kind === "new") {
      titleDialog = {
        kind: "new",
        mood: "deal",
        speech: "一辈子？",
        body: [
          "新的开始会清空当前存档。",
          "彩票、最高分、已购商品和当前装备都会被重置。",
          "确认后会立刻开始新的一局。"
        ],
        confirmLabel: "确认新的开始",
        cancelLabel: "再想想"
      };
      return;
    }
    titleDialog = {
      kind: "quit",
      mood: "cry",
      speech: "只要你肯回来，我什么都会做的",
      body: [
        "退出后会离开游戏页面。",
        "如果浏览器不允许脚本直接关闭页面，请手动返回或关闭标签页。",
        "确认后会尝试退出到上一页或空白页。"
      ],
      confirmLabel: "确认退出",
      cancelLabel: "我再看看"
    };
  }

  function closeTitleDialog() {
    titleDialog = null;
    titleDialogRects = [];
  }

  function confirmTitleDialog() {
    if (!titleDialog) return;
    const kind = titleDialog.kind;
    titleDialog = null;
    titleDialogRects = [];
    if (kind === "new") {
      clearAllProgressData();
      reset();
      return;
    }
    stopMusic();
    try { if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen(); } catch {}
    try { window.close(); } catch {}
    try { if (history.length > 1) history.back(); } catch {}
    setTimeout(() => {
      try { location.replace("about:blank"); } catch {}
    }, 120);
  }

  function handleTitleClick(x, y) {
    if (titleDialog) {
      for (const rect of titleDialogRects) {
        if (x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h) {
          if (rect.id === "cancel") closeTitleDialog();
          if (rect.id === "confirm") confirmTitleDialog();
          return;
        }
      }
      return;
    }
    for (const rect of titleMenuRects) {
      if (x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h) {
        if (rect.id === "continue") reset();
        else if (rect.id === "new") openTitleDialog("new");
        else if (rect.id === "quit") openTitleDialog("quit");
        else if (rect.id === "shop") enterShop();
        return;
      }
    }
  }

  function allWeaponsCollected() {
    return ["basic", "rapid", "arc", "royal", "mars"].every(id => !!owned[id]);
  }

  function allShopItemsCollected() {
    return SHOP_ORDER.every(id => !!owned[id]);
  }

  function rollSecretPrice() {
    return 1000 + Math.floor(Math.random() * 4001);
  }

  function privateSecretById(id) {
    return KING_PRIVATE_DIALOGUES.find(q => q.id === id) || null;
  }

  function allPrivateSecretsRevealed() {
    return KING_PRIVATE_DIALOGUES.every(q => !!revealedSecrets[q.id]);
  }

  function hiddenSecretCandidates() {
    // 小祥超市的纸条抽取没有总量上限：已经揭示过的秘密也可以再次抽到。
    // 持有上限由 secretNotes.length >= 7 单独控制，避免商店 UI 溢出。
    return KING_PRIVATE_DIALOGUES.map(q => q.id);
  }

  function secretShopPitch() {

  function buyOrEquip(id) {
    const item = SHOP_ITEMS[id];
    if (!item) return;
    if (owned[id]) {
      if (item.type === "weapon") {
        setWeapon(id);
        setMerchantSpeech("哼，算你识货。拿去用吧。", "approve", 150);
        playSfx("buy");
      } else {
        addText(W / 2, 160, item.name + " 已拥有", "#fde68a");
        setMerchantSpeech("已经卖给你了，别一直摸展柜。", "angry", 160);
        playSfx("bad");
      }
      return;
    }

    if (tickets < item.cost) {
      const shortage = item.cost - tickets;
      if (creditEligible(item)) {
        shopCreditPressure++;
        const forcedRefusal = shopCreditPressure <= 20;
        const stealChance = Math.min(.38, .08 + Math.max(0, shopCreditPressure - 21) * .018);

        if (forcedRefusal || Math.random() >= stealChance) {
          addText(W / 2, 160, "国王不愿赊账：" + item.name, "#fecaca");
          setMerchantSpeech("不卖不卖！彩票不够就别摸国王的货！", "angry", 180);
          playSfx("bad");
          return;
        }

        const newDebt = Math.ceil(shortage * 1.5);
        tickets = 0;
        debt += newDebt;
        owned[id] = true;
        if (item.type === "weapon") weapon = id;
        saveProgress();
        addText(W / 2, 160, "你抢到了：" + item.name, "#fde68a");
        addText(W / 2, 190, "欠国王 " + shortage.toLocaleString("zh-CN") + "，含利息需还 " + newDebt.toLocaleString("zh-CN") + " 彩票", "#fecaca");
        startShopTheftCinematic(item, shortage, newDebt);
        return;
      }

      addText(W / 2, 160, "彩票不足，还差 " + shortage.toLocaleString("zh-CN"), "#fecaca");
      setMerchantSpeech("你想偷国王的东西？一点骑士精神都没有！", "angry", 210);
      playSfx("bad");
      return;
    }

    tickets -= item.cost;
    owned[id] = true;
    if (item.type === "weapon") weapon = id;
    saveProgress();
    addText(W / 2, 160, "兑换成功：" + item.name, "#bbf7d0");

    else setMerchantSpeech("哈哈哈！成交得丝哇！", "deal", 210);

  function describeLastRun() {
    const r = lastRun || { score: 0, tickets: 0, combo: 0, difficulty: "normal", previousBest: 0, previousScore: 0 };
    const mockery = [
      "国王见过更吓人的东西，比如没拧紧的气球。",
      "你这局像一只认真工作的喷水壶，努力很多，威胁很少",

    ];

      "这次值得记一笔，虽然国王会用很小的字写。",

    let mood = "cold";

      pool = mildPraise;
    } else if (beatLastRun) {
      mood = "angry";
      pool = sarcasm;

    const line = pool[Math.floor(Math.random() * pool.length)];
    setMerchantSpeech(line, mood, 999999);

  function choosePrizeType() {
    const total = prizeTypes.reduce((s, p) => s + p.rarity, 0);
    let r = Math.random() * total;
    for (const p of prizeTypes) {
      r -= p.rarity;
      if (r <= 0) return p;
    }
    return prizeTypes[0];
  }

  function chooseKingDisguiseType() {
    const candidates = prizeTypes.filter(p => p.type !== "crown");
    return candidates[Math.floor(Math.random() * candidates.length)] || prizeTypes[0];
  }

  function spawnPrize(xOverride, laneIndexOverride, forceKing = false) {
    const laneIndex = forceKing ? 0 : (laneIndexOverride ?? Math.floor(Math.random() * lanes.length));
    const lane = lanes[laneIndex];
    const dir = laneIndex % 2 === 0 ? -1 : 1;
    const spawnX = xOverride ?? (dir < 0 ? W + 100 : -100);
    const p = forceKing ? { type: "king", name: "国王", base: 456, rarity: 0 } : choosePrizeType(); // 168 * e 向下取整 = 456
    const disguise = forceKing ? chooseKingDisguiseType() : null;
    const normalScale = lane.scale * rand(.90, 1.08);
    // 国王就算伪装成普通玩偶，也必须在玩偶堆里一眼能看出来：
    // 伪装体型直接接近正常国王出现时的难度/尺寸，而不是普通玩偶尺寸。
    const disguisedKingScale = lane.scale * rand(2.62, 2.92);
    const revealedKingScale = Math.max(disguisedKingScale, lane.scale * rand(2.70, 3.00));

    prizes.push({
      id: Math.random().toString(36).slice(2),
      type: p.type,
      name: p.name,
      base: p.base,
      lane: laneIndex,
      x: spawnX,
      y: lane.y,
      z: lane.z,
      scale: forceKing ? disguisedKingScale : normalScale,
      normalScale: forceKing ? disguisedKingScale : normalScale,
      kingScale: forceKing ? revealedKingScale : 0,
      dir,
      wobble: rand(0, Math.PI * 2),
      hp: forceKing ? 1 : (p.type === "crown" ? 2 : 1),
      king: forceKing,
      kingMaxHp: forceKing ? kingHitsNeeded() : 0,
      feastLevel: forceKing ? feverFeastLevel : 0,
      disguised: !!forceKing,
      disguiseType: disguise ? disguise.type : null,
      disguiseName: disguise ? disguise.name : null,
      disguiseBase: disguise ? disguise.base : null,
      forceHit: false,
      dodgeCooldown: 0,
      fall: 0,
      vx: 0,
      vy: 0,
      rot: 0,
      spin: 0,
      alive: true
    });
  }

  function getVisualType(p) {
    if (p.king && p.disguised && p.disguiseType) return p.disguiseType;
    return p.king ? "king" : p.type;
  }

  function getPrizeBox(p) {
    const s = p.scale;
    const visualType = getVisualType(p);
    let w = 72 * s, h = 82 * s;
    if (visualType === "ball") { w = 62 * s; h = 62 * s; }
    if (visualType === "star") { w = 66 * s; h = 66 * s; }
    if (visualType === "crown") { w = 76 * s; h = 60 * s; }
    if (visualType === "duck") { w = 76 * s; h = 58 * s; }
    if (visualType === "king") { w = 122 * s; h = 124 * s; }
    return { x: p.x - w / 2, y: p.y - h, w, h };
  }

  function rects(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function targetAt(x, y, extraPad = 0) {
    let target = null, targetDist = Infinity;
    let kingCandidate = null, kingDist = Infinity;

    for (const p of prizes) {
      if (!p.alive || p.fall > 0) continue;
      const box = getPrizeBox(p);
      const pad = 7 + 10 * p.scale + (owned.grip ? 10 : 0) + extraPad;
      const inside = x >= box.x - pad && x <= box.x + box.w + pad && y >= box.y - pad && y <= box.y + box.h + pad;
      if (!inside) continue;

      const cx = box.x + box.w / 2;
      const cy = box.y + box.h / 2;
      const dist = Math.hypot(x - cx, y - cy) / p.scale;
      if (p.king && !p.disguised) {
        if (dist < kingDist) { kingDist = dist; kingCandidate = p; }
      } else if (dist < targetDist) {
        targetDist = dist; target = p;
      }
    }
    return kingCandidate || target;
  }

  function shoot(auto = false) {
    startMusic();

    if (state === "title") { handleTitleClick(pointer.x, pointer.y); return; }
    if (state === "ended") {
      handleEndOverlayClick(pointer.x, pointer.y);
      return;
    }
    if (state === "shop") { handleShopClick(pointer.x, pointer.y); return; }
    if (state === "achievements") { handleAchievementsClick(pointer.x, pointer.y); return; }
    if (state !== "running") return;

    const fever = feverTimer > 0;
    const stats = weaponStats();

    if (weapon === "royal") {
      royalSwing();
      return;
    }

    if (weapon === "arc") {
      if (fever) fireArcAuto(pointer.x, pointer.y);
      return;
    }

    if (weapon === "mars" && fever) {
      if (marsNukeCooldown <= 0) {
        marsNuke(pointer.x, pointer.y);
        marsNukeCooldown = 108;
      }
      return;
    }

    const noAmmoLimit = fever || stats.noReload;
    if (!noAmmoLimit && reloadTimer > 0) return;
    if (!noAmmoLimit && ammo <= 0) {
      startReload();
      addText(W / 2, H - 150, "需要装填", "#fff7ed");
      return;
    }

    if (!noAmmoLimit) ammo--;
    recoil = fever ? 8 : (weapon === "mars" ? 9 : 16);
    shake = Math.max(shake, 4);
    shots.push({ type: "shot", x: pointer.x, y: pointer.y, life: 12, r: 4 });
    playSfx("shoot");

    const target = targetAt(pointer.x, pointer.y);
    if (target) hitPrize(target, pointer.x, pointer.y);
    else missAt(pointer.x, pointer.y);

    if (!noAmmoLimit && ammo <= 0) setTimeout(() => startReload(), 120);
  }

  function missAt(x, y) {
    addText(x, y - 24, "MISS", "rgba(255,255,255,.75)");
    for (let i = 0; i < 5; i++) {
      particles.push({
        x: x + rand(-8, 8), y: y + rand(-8, 8),
        vx: rand(-1.3, 1.3), vy: rand(-1.3, 1.3),
        life: rand(10, 18), size: rand(1.5, 3.5), color: "rgba(255,255,255,.8)"
      });
    }
  }

  function getGunCenter() {
    return { x: W / 2, y: H - 116 };
  }

  function norm(x, y) {
    const len = Math.hypot(x, y) || 1;
    return { x: x / len, y: y / len };
  }

  function distancePointToRay(px, py, ox, oy, dx, dy) {
    const vx = px - ox, vy = py - oy;
    const t = vx * dx + vy * dy;
    if (t < 0) return { dist: Infinity, t };
    const projX = ox + dx * t;
    const projY = oy + dy * t;
    return { dist: Math.hypot(px - projX, py - projY), t };
  }

  function firstTargetOnRay(ox, oy, dx, dy) {
    let best = null, bestT = Infinity;
    let kingBest = null, kingT = Infinity;

    for (const p of prizes) {
      if (!p.alive || p.fall > 0) continue;
      const box = getPrizeBox(p);
      const cx = box.x + box.w / 2;
      const cy = box.y + box.h / 2;
      const hit = distancePointToRay(cx, cy, ox, oy, dx, dy);
      const threshold = Math.max(18, Math.min(box.w, box.h) * .42);
      if (hit.t > 0 && hit.t < 1300 && hit.dist <= threshold) {
        if (p.king && !p.disguised) {
          if (hit.t < kingT) { kingT = hit.t; kingBest = p; }
        } else if (hit.t < bestT) {
          bestT = hit.t; best = p;
        }
      }
    }
    return kingBest || best;
  }

  function shortestAngleDiff(a, b) {
    let d = b - a;
    while (d > Math.PI) d -= Math.PI * 2;
    while (d < -Math.PI) d += Math.PI * 2;
    return d;
  }

  function fireArcManual(x1, y1, x2, y2) {
    const fever = feverTimer > 0;
    const muzzle = getGunCenter();
    const chordLen = Math.hypot(x2 - x1, y2 - y1);

    if (!fever && chordLen < ARC_MIN_MANUAL_CHORD) {
      addText((x1 + x2) / 2, (y1 + y2) / 2 - 22, "弦太短", "#fecaca");
      playSfx("bad");
      return;
    }

    if (!fever && (reloadTimer > 0 || ammo <= 0)) {
      startReload();
      return;
    }
    if (!fever) ammo--;

    let a1 = Math.atan2(y1 - muzzle.y, x1 - muzzle.x);
    let a2 = Math.atan2(y2 - muzzle.y, x2 - muzzle.x);
    let diff = shortestAngleDiff(a1, a2);

    if (Math.abs(diff) < .34) {
      const mid = Math.atan2(((y1 + y2) / 2) - muzzle.y, ((x1 + x2) / 2) - muzzle.x);
      a1 = mid - .20;
      diff = .40;
    }

    const bulletCount = ARC_BURST_COUNT + (fever ? ARC_FEVER_BONUS : 0);
    recoil = fever ? 8 : 12;
    shake = Math.max(shake, fever ? 5 : 4);
    shots.push({ type: "arcLine", x1, y1, x2, y2, life: 24 });
    playSfx("shoot");

    let hits = 0;
    for (let i = 0; i < bulletCount; i++) {
      const t = bulletCount === 1 ? .5 : i / (bulletCount - 1);
      const angle = a1 + diff * t;
      const dx = Math.cos(angle);
      const dy = Math.sin(angle);

      if (i === 0 || i === bulletCount - 1 || i % 3 === 1) {
        shots.push({ type: "arcRay", x1: muzzle.x, y1: muzzle.y, x2: muzzle.x + dx * 980, y2: muzzle.y + dy * 980, life: 13 });
      }

      const target = firstTargetOnRay(muzzle.x, muzzle.y, dx, dy);
      if (target) {
        const box = getPrizeBox(target);
        hitPrize(target, box.x + box.w / 2, box.y + box.h / 2);
        hits++;
      }
    }

    if (hits > 0) {
      addText((x1 + x2) / 2, (y1 + y2) / 2 - 22, "弧弹×" + bulletCount, fever ? "#f5d0fe" : "#e9d5ff");
    } else {
      missAt((x1 + x2) / 2, (y1 + y2) / 2);
    }

    if (!fever && ammo <= 0) setTimeout(() => startReload(), 120);
  }

  function fireArcAuto(tx, ty) {
    const muzzle = getGunCenter();
    const to = norm(tx - muzzle.x, ty - muzzle.y);
    const px = -to.y;
    const py = to.x;
    const len = ARC_AUTO_HALF_CHORD;
    const cx = tx;
    const cy = ty - 14;
    const x1 = cx + px * len;
    const y1 = cy + py * len;
    const x2 = cx - px * len;
    const y2 = cy - py * len;
    shots.push({ type: "arcCurve", x1, y1, x2, y2, cx, cy: cy - 88, life: 26 });
    fireArcManual(x1, y1, x2, y2);
  }

  function strikeKingMultiple(p, x, y, attempts, label) {
    let left = attempts;
    if (p.disguised) {
      hitPrize(p, x, y);
      left--;
    }
    let successes = 0;
    for (let i = 0; i < left; i++) {
      if (Math.random() >= .99) successes++;
    }
    addText(x, y - 48, label + "：命中 " + successes, "#fde68a");
    if (successes === 0) {
      playSfx("dodge");
      return;
    }
    for (let i = 0; i < successes && p.alive && p.fall <= 0; i++) {
      p.forceHit = true;
      hitPrize(p, x, y);
      p.forceHit = false;
    }
  }

  function royalSwing() {
    if (royalSwingCooldown > 0) return;
    royalSwingCooldown = 22;
    royalSwingAnim = 16;
    recoil = 10;
    shake = Math.max(shake, 3);

    const dir = Math.random() < .5 ? -1 : 1;
    const width = 170;
    const height = 70;
    const x1 = pointer.x - width / 2;
    const x2 = pointer.x + width / 2;
    const y = pointer.y + rand(-12, 12);
    const sweep = { x: x1, y: y - height / 2, w: width, h: height };

    shots.push({ type: "slash", x1, x2, y, dir, life: 18 });
    playSfx("swing");

    const hits = prizes
      .filter(p => p.alive && p.fall <= 0 && rects(sweep, getPrizeBox(p)))
      .sort((a, b) => (b.king ? 1 : 0) - (a.king ? 1 : 0));

    if (hits.length === 0) {
      missAt(pointer.x, pointer.y);
      return;
    }

    for (const p of hits.slice(0, 4)) {
      const box = getPrizeBox(p);
      const hx = box.x + box.w / 2;
      const hy = box.y + box.h / 2;
      if (p.king) strikeKingMultiple(p, hx, hy, ROYAL_SWING_KING_ATTACKS, "权杖重击×" + ROYAL_SWING_KING_ATTACKS);
      else hitPrize(p, hx, hy);
    }
  }

  function marsNuke(x, y) {
    if (state !== "running") return;
    recoil = 24;
    shake = Math.max(shake, 20);
    shots.push({ type: "nuke", x, y, life: 34, r: 28 });
    playSfx("nuke");

    const radius = Math.min(W, H) * .40;
    addText(x, y - radius * .42, "火星核弹！", "#fde68a");

    for (let i = 0; i < 70; i++) {
      const a = rand(0, Math.PI * 2);
      const sp = rand(2, 9);
      particles.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: rand(24, 54), size: rand(3, 9),
        color: i % 3 === 0 ? "#fde68a" : (i % 3 === 1 ? "#fb923c" : "#fff7ed")
      });
    }

    const affected = prizes
      .filter(p => p.alive && p.fall <= 0)
      .map(p => {
        const box = getPrizeBox(p);
        const cx = box.x + box.w / 2;
        const cy = box.y + box.h / 2;
        return { p, box, dist: Math.hypot(cx - x, cy - y) };
      })
      .filter(hit => hit.dist <= radius + Math.min(hit.box.w, hit.box.h) * .45)
      .sort((a, b) => (b.p.king ? 1 : 0) - (a.p.king ? 1 : 0));

    for (const hit of affected) {
      const p = hit.p;
      const box = hit.box;
      const hx = box.x + box.w / 2;
      const hy = box.y + box.h / 2;

      if (!p.king) {
        p.hp = 1;
        hitPrize(p, hx, hy);
      } else {
        marsNukeAgainstKing(p, hx, hy);
      }
    }
  }

  function marsNukeAgainstKing(p, x, y) {
    let attempts = MARS_NUKE_KING_ATTACKS;
    let successes = 0;

    if (p.disguised) {
      hitPrize(p, x, y);
      attempts--;
    }

    for (let i = 0; i < attempts; i++) {
      if (Math.random() >= .99) successes++;
    }

    addText(x, y - 48, "核弹等效" + MARS_NUKE_KING_ATTACKS + "发：命中 " + successes, "#fde68a");

    for (let i = 0; i < successes && p.alive && p.fall <= 0; i++) {
      p.forceHit = true;
      hitPrize(p, x, y);
      p.forceHit = false;
    }

    if (successes === 0) {
      addText(x, y - 18, "国王闪过核弹", "#fde68a");
    }
  }

  function revealKing(p, x, y) {
    p.disguised = false;
    p.disguiseType = null;
    p.disguiseName = null;
    p.disguiseBase = null;
    p.scale = p.kingScale || p.scale;
    p.name = "国王";
    p.base = Math.floor(168 * Math.E);
    playSfx("hit");
    p.kingMaxHp = p.kingMaxHp || kingHitsNeeded();
    p.hp = p.kingMaxHp;
    p.wobble += 8;
    shake = Math.max(shake, 12);
    combo++;
    maxComboRun = Math.max(maxComboRun, combo);
    comboTimer = 110;
    addText(x, y - 34, "伪装破除！", "#fde68a");
    for (let i = 0; i < 24; i++) {
      particles.push({
        x, y, vx: rand(-6, 6), vy: rand(-6, 3), life: rand(18, 38),
        size: rand(3, 7), color: i % 2 ? "#a16207" : "#fde68a"
      });
    }
  }

  function hitPrize(p, x, y) {
    if (!p.alive || p.fall > 0) return;

    if (p.king && p.disguised) {
      revealKing(p, x, y);
      return;
    }

    if (p.king && !p.forceHit && Math.random() < .99) {
      if (p.dodgeCooldown <= 0) {
        const oldLane = p.lane;
        const newLane = clamp(oldLane + (Math.random() < .5 ? -1 : 1), 0, lanes.length - 1);
        p.lane = newLane === oldLane ? (oldLane === 0 ? 1 : oldLane - 1) : newLane;
        p.y = lanes[p.lane].y;
        p.x += p.dir * rand(52, 96);
        p.dodgeCooldown = 24;
        p.wobble += 5;
        shake = Math.max(shake, 5);
        addText(x, y - 26, "国王闪避！", "#fde68a");
      }
      playSfx("dodge");
      for (let i = 0; i < 12; i++) {
        particles.push({ x, y, vx: rand(-3, 3), vy: rand(-4, 2), life: rand(12, 24), size: rand(2, 5), color: "#fde68a" });
      }
      return;
    }

    playSfx("hit");
    p.hp--;
    p.dodgeCooldown = Math.max(0, p.dodgeCooldown - 1);
    shake = Math.max(shake, 8);
    combo++;
    maxComboRun = Math.max(maxComboRun, combo);
    comboTimer = 110;

    for (let i = 0; i < 18; i++) {
      particles.push({
        x, y, vx: rand(-5, 5), vy: rand(-5.6, 2.4), life: rand(16, 34),
        size: rand(2, 6), color: i % 2 ? "#fff7ed" : "#facc15"
      });
    }

    if (p.hp > 0) {
      const kingMax = p.kingMaxHp || kingHitsNeeded();
      addText(x, y - 24, p.king ? ("国王命中 " + (kingMax - p.hp) + "/" + kingMax) : "HIT!", "#fef3c7");
      p.wobble += 2.2;
      return;
    }

    knockDownPrize(p, x, y);
  }

  function kingDefeatThreatLine() {
    const threats = [
      "欧内该，被点掉的话，瓦↗哒↘西…",
      
      "我从来没有觉得当玩偶开心过",
      "我什么都愿意做的",
      "好想成为人类啊",
      "过去软弱的我…已经死了",
      "你这个人，真是满脑子都想着自己呢",
      "为什么要演奏春日影？？？"
    ];
    return threats[Math.floor(Math.random() * threats.length)];
  }

  function prizeRewardValues(p, multiplier = 1) {
    const depthBonus = 1 + (p.z - 1) * .55;
    const comboBonus = 1 + Math.min(combo - 1, 12) * .09;
    const d = DIFFICULTY[difficulty];
    const reward = Math.round(p.base * depthBonus * comboBonus * d.hitBonus * multiplier);
    const ticketReward = Math.max(1, Math.round((reward / 80) * (owned.lucky ? 1.5 : 1)));
    return { reward, ticketReward };
  }

  function awardPrizeReward(p, x, y, multiplier = 1, countForFever = true) {
    const { reward, ticketReward } = prizeRewardValues(p, multiplier);

    score += reward;
    if (countForFever && feverTimer <= 0 && feverCooldownTimer <= 0) {
      feverScore += reward;
      if (feverScore >= feverNext) enterFever();
    }

    tickets += ticketReward;
    runTickets += ticketReward;
    best = Math.max(best, score);
    localStorage.setItem(SAVE_PREFIX + "best", String(best));
    saveProgress();

    const rewardText = multiplier === 1 ? ("+" + reward) : ("×" + multiplier.toFixed(1) + "  +" + reward);
    addText(x, y - 30, rewardText, "#fff7ed");
    addText(x, y - 5, "彩票 +" + ticketReward, "#fde68a");
    return { reward, ticketReward };
  }

  function makePrizeFall(p, force = 1) {
    p.kingCinematic = false;
    p.fall = 1;
    p.vx = rand(-1.5, 1.5) * force;
    p.vy = rand(-4.6, -2.5) * force;
    p.spin = rand(-.16, .16) * force;
  }

  function dropPrizeWithReward(p, multiplier = 1, countForFever = true) {
    if (!p.alive || p.fall > 0) return null;
    const box = getPrizeBox(p);
    const x = box.x + box.w / 2;
    const y = box.y + box.h / 2;
    makePrizeFall(p, multiplier > 1 ? 1.25 : 1);
    return awardPrizeReward(p, x, y, multiplier, countForFever);
  }

  function knockDownPrize(p, x, y) {
    if (p.king) {
      startKingDefeatCinematic(p, x, y);
      return;
    }

    dropPrizeWithReward(p, 1, true);

    if (feverTimer > 0 && combo >= 8 && combo % 4 === 0 && feverExtraGained < FEVER_EXTRA_CAP) {
      const extra = Math.min(45, FEVER_EXTRA_CAP - feverExtraGained);
      feverTimer += extra;
      feverExtraGained += extra;
      addText(W / 2, 236, "连击奖励 +" + Math.round(extra / 60) + "秒", "#bbf7d0");
    }

    if (combo >= 5) burstConfetti(10);
  }

  function startKingDefeatCinematic(p, x, y) {
    const box = getPrizeBox(p);
    state = "kingSpeech";
    pointer.down = false;
    autoFireCooldown = 0;
    marsAutoCooldown = 0;
    marsNukeCooldown = 0;
    royalGuardCooldown = 0;
    shots = [];

    p.disguised = false;
    p.kingCinematic = true;
    p.fall = 0;
    p.hp = 0;
    p.vx = 0;
    p.vy = 0;
    p.spin = 0;

    kingCinematic = {
      prize: p,
      line: kingDefeatThreatLine(),
      shown: 0,
      charTimer: 0,
      doneTimer: 0,
      finished: false,
      fast: false,
      moveTimer: 0,
      startX: p.x,
      startY: p.y,
      startScale: p.scale,
      targetX: W / 2,
      targetY: H / 2 + 88,
      targetScale: Math.max(p.scale, 2.55),
      hitX: x ?? (box.x + box.w / 2),
      hitY: y ?? (box.y + box.h / 2)
    };

    shake = Math.max(shake, 18);
    burstConfetti(18);
  }

  function accelerateKingSpeech() {
    if (state !== "kingSpeech" || !kingCinematic) return;
    if (kingCinematic.shown < kingCinematic.line.length) {
      kingCinematic.shown = kingCinematic.line.length;
      kingCinematic.fast = true;
      kingCinematic.doneTimer = Math.max(kingCinematic.doneTimer, 240);
    } else {
      kingCinematic.doneTimer = 9999;
    }
  }

  function finishKingDefeatCinematic() {
    if (!kingCinematic || kingCinematic.finished) return;
    kingCinematic.finished = true;

    if (kingCinematic.mode === "shopTheft") {
      addText(W / 2, 190, "你被国王赶出了小店", "#fecaca");
      kingCinematic = null;
      prizes = [];
      shots = [];
      floating = [];
      confetti = [];
      pointer.down = false;
      state = "title";
      return;
    }

    const swept = prizes.filter(p => p.alive && p.fall <= 0);
    for (const p of swept) {
      dropPrizeWithReward(p, KING_SWEEP_REWARD_MULTIPLIER, false);
    }

    feverFeastLevel++;
    feverTimer = FEVER_BASE;
    feverExtraGained = 0;
    feverCooldownTimer = 0;
    feverTimeExtendActive = false;
    scheduleFeverKing(300, 480);
    ammo = weaponStats().ammoMax;
    reloadTimer = 0;
    if (weapon === "royal") setupRoyalGuards();

    addText(W / 2, 196, "国王带走全场：奖励 ×" + KING_SWEEP_REWARD_MULTIPLIER.toFixed(1), "#fde68a");
    addText(W / 2, 228, "狂热重置：盛宴 Lv." + feverFeastLevel + "，下次需要 " + kingHitsNeeded() + " 次命中", "#fef3c7");
    shake = Math.max(shake, 20);
    burstConfetti(44);

    kingCinematic = null;
    state = "running";
  }

  function updateKingDefeatCinematic(dt) {
    if (!kingCinematic) return;
    const c = kingCinematic;
    const p = c.prize;

    const moveTime = c.moveTime || KING_CINEMATIC_MOVE_TIME;
    c.moveTimer = Math.min(moveTime, c.moveTimer + dt);
    const raw = c.moveTimer / moveTime;
    const ease = 1 - Math.pow(1 - raw, 3);
    p.x = c.startX + (c.targetX - c.startX) * ease;
    p.y = c.startY + (c.targetY - c.startY) * ease;
    p.scale = c.startScale + (c.targetScale - c.startScale) * ease;
    p.rot *= .84;
    p.wobble += dt / 230;

    const interval = c.fast ? KING_SPEECH_FAST_INTERVAL : KING_SPEECH_CHAR_INTERVAL;
    c.charTimer += dt;
    while (c.shown < c.line.length && c.charTimer >= interval) {
      c.shown++;
      c.charTimer -= interval;
      if (c.shown % 3 === 0) playSfx("tick");
    }

    if (c.shown >= c.line.length) {
      c.doneTimer += dt;
      if (c.doneTimer >= (c.fast ? 320 : 1150)) finishKingDefeatCinematic();
    }
  }

  function burstConfetti(n) {
    for (let i = 0; i < n; i++) {
      confetti.push({
        x: rand(60, W - 60), y: rand(-80, 180),
        vx: rand(-2.6, 2.6), vy: rand(2.2, 5.8),
        rot: rand(0, Math.PI), vr: rand(-.24, .24), life: rand(80, 145),
        size: rand(5, 13),
        color: ["#fca5a5", "#fde68a", "#bfdbfe", "#bbf7d0", "#ddd6fe"][Math.floor(rand(0, 5))]
      });
    }
  }

  function enterFever() {
    feverTimer = FEVER_BASE;
    feverCooldownTimer = 0;
    feverExtraGained = 0;
    feverFeastLevel = 0;
    scheduleFeverKing(360, 540); // 6-9 秒
    feverNext += DIFFICULTY[difficulty].feverStep;
    reloadTimer = 0;
    ammo = weaponStats().ammoMax;
    shake = Math.max(shake, 14);
    addText(W / 2, 180, weapon === "royal" ? "皇家卫队就位！" : "狂热模式！国王即将登场", "#fde68a");
    burstConfetti(36);

    if (weapon === "royal") setupRoyalGuards();
  }

  function setupRoyalGuards() {
    royalGuards = [];
    for (let i = 0; i < 4; i++) {
      royalGuards.push({
        x: 180 + i * 220,
        y: H - 72 + Math.sin(i) * 10,
        cool: i * 5
      });
    }
    royalGuardCooldown = 0;
  }

  function selectGuardTarget() {
    const alive = prizes.filter(p => p.alive && p.fall <= 0);
    const king = alive.find(p => p.king);
    if (king) return king;
    if (alive.length === 0) return null;
    alive.sort((a, b) => getPrizeBox(a).y - getPrizeBox(b).y);
    return alive[Math.floor(rand(0, Math.min(4, alive.length)))];
  }

  function royalGuardFire(g) {
    const target = selectGuardTarget();
    if (!target) return;
    const box = getPrizeBox(target);
    const tx = box.x + box.w / 2;
    const ty = box.y + box.h / 2;
    shots.push({ type: "guard", x1: g.x, y1: g.y, x2: tx, y2: ty, life: 12 });
    if (target.king) strikeKingMultiple(target, tx, ty, ROYAL_GUARD_KING_ATTACKS, "护卫枪×" + ROYAL_GUARD_KING_ATTACKS);
    else hitPrize(target, tx, ty);
  }

  function royalGuardVolley() {
    if (royalGuards.length === 0) setupRoyalGuards();

    for (const g of royalGuards) {
      royalGuardFire(g);
    }
  }

  function startReload() {
    const stats = weaponStats();
    if (feverTimer > 0 || stats.noReload) return;
    if (reloadTimer > 0 || ammo === stats.ammoMax) return;
    reloadTimer = 70;
  }

  function togglePause() {
    if (state === "kingSpeech") return;
    if (state === "running") {
      state = "paused";
      if (pauseBtn) pauseBtn.textContent = "继续";
    } else if (state === "paused") {
      state = "running";
      if (pauseBtn) pauseBtn.textContent = "暂停";
    }
  }

  function update(dt) {
  if (state === 'achievements') {
    achVel *= Math.pow(0.90, dt/16);
    achScroll = clamp(achScroll + achVel, 0, achScrollMax);
  }

    if (state === "kingSpeech") {
      frame++;
      const seconds = dt / 1000;
      const d = DIFFICULTY[difficulty];
      updatePrizeMotion(dt, seconds, d);
      updateKingDefeatCinematic(dt);
      recoil *= .86;
      shake *= .82;
      updateParticles();
      return;
    }

    if (state !== "running") {
      if (state === "shop" || state === "achievements") startMusic();
      if (state === "ended") {
        endOverlayAnim = Math.min(END_OVERLAY_DURATION, endOverlayAnim + dt);
        endOverlayInputLock = Math.max(0, endOverlayInputLock - dt);
      }
      updateParticles();
      return;
    }

    frame++;
    const seconds = dt / 1000;
    const d = DIFFICULTY[difficulty];

    timeLeft -= seconds;
    if (timeLeft <= 0) {
      if (owned.feverclock && feverTimer > 0) {
        if (!feverTimeExtendActive) {
          feverTimeExtendActive = true;
          addText(W / 2, 164, "狂热沙漏：续时到狂热结束", "#fde68a");
          shake = Math.max(shake, 10);
        }
        timeLeft = Math.max(seconds, feverTimer / 60);
      } else {
        timeLeft = 0;
        endRun();
        return;
      }
    }

    const fever = feverTimer > 0;
    const densityBoost = endgameWeaponDensityBoost();
    spawnTimer -= dt * (fever ? 2.85 : 1);
    if (spawnTimer <= 0) {
      spawnPrize();
      if (fever && Math.random() < .55) spawnPrize();
      spawnTimer = ((fever ? d.spawn * .28 : d.spawn / 2.25) / densityBoost) * rand(.70, 1.14);
    }

    if (feverTimer > 0) {
      feverTimer--;

      if (!kingSpawnedThisFever && feverKingSpawnTimer > 0) {
        feverKingSpawnTimer--;
        if (feverKingSpawnTimer <= 0) {
          kingSpawnedThisFever = true;
          spawnPrize(W - 150, 0, true);
          addText(W / 2, 184, "国王混入奖品！", "#fde68a");
          shake = Math.max(shake, 10);
        }
      }

      ammo = weaponStats().ammoMax;
      reloadTimer = 0;

      if (weapon === "royal") {
        if (royalGuards.length === 0) setupRoyalGuards();
        for (const g of royalGuards) {
          g.cool--;
          if (g.cool <= 0) {
            royalGuardFire(g);
            g.cool = ROYAL_GUARD_FEVER_COOLDOWN;
          }
        }
      } else if (pointer.down) {
        if (weapon === "mars") {
          marsNukeCooldown--;
          if (marsNukeCooldown <= 0) {
            marsNuke(pointer.x, pointer.y);
            marsNukeCooldown = 108;
          }
        } else {
          autoFireCooldown--;
          if (autoFireCooldown <= 0) {
            shoot(true);
            autoFireCooldown = 5;
          }
        }
      } else {
        autoFireCooldown = 0;
        marsNukeCooldown = 0;
      }

      if (feverTimer <= 0) {
        feverCooldownTimer = 600;
        feverKingSpawnTimer = 0;
        autoFireCooldown = 0;
        marsNukeCooldown = 0;
        pointer.down = false;
        shake = 0;
        recoil = 0;
        shots = [];
        royalGuards = [];
        feverFeastLevel = 0;
        feverTimeExtendActive = false;
        addText(W / 2, 184, "狂热冷却 10 秒", "#cbd5e1");
      }
    } else if (feverCooldownTimer > 0) {
      feverCooldownTimer--;
    }

    if (reloadTimer > 0) {
      reloadTimer--;
      if (reloadTimer <= 0) {
        ammo = weaponStats().ammoMax;
        addText(W / 2, H - 140, "装填完成", "#bbf7d0");
      }
    }

    if (royalSwingCooldown > 0) royalSwingCooldown--;
    if (royalSwingAnim > 0) royalSwingAnim--;

    if (feverTimer <= 0 && state === "running" && pointer.down) {
      const stats = weaponStats();
      if (weapon === "mars") {
        marsAutoCooldown--;
        if (marsAutoCooldown <= 0) {
          shoot(true);
          marsAutoCooldown = 25; // 狂热扫射 5 帧；火星枪普通扫射约 1/5 速度
        }
      } else if (weapon === "rapid" && reloadTimer <= 0 && ammo > 0) {
        autoFireCooldown--;
        if (autoFireCooldown <= 0) {
          shoot(true);
          autoFireCooldown = stats.autoCooldown;
        }
      }
    } else if (feverTimer <= 0) {
      marsAutoCooldown = 0;
      if (weapon !== "rapid") autoFireCooldown = 0;
    }

    if (comboTimer > 0) comboTimer--;
    else combo = 0;

    recoil *= .86;
    shake *= .82;

    updatePrizeMotion(dt, seconds, d);
    updateParticles();
  }

  function updatePrizeMotion(dt, seconds, d) {
    for (const p of prizes) {
      if (p.kingCinematic) continue;
      if (p.dodgeCooldown > 0) p.dodgeCooldown--;
      const lane = lanes[p.lane];

      if (p.fall > 0) {
        p.fall += seconds * 2.3;
        p.x += p.vx * dt * .06;
        p.y += p.vy;
        p.vy += .24;
        p.rot += p.spin;
        p.scale *= 1.0018;
        if (p.y > H + 80 || p.fall > 4) p.alive = false;
      } else {
        const feverMove = feverTimer > 0 ? 2.15 : 1.5;
        p.x += p.dir * lane.speed * d.speed * feverMove * seconds;
        p.wobble += seconds * 4.4;
        const margin = 160;
        if (p.dir < 0 && p.x < -margin) p.alive = false;
        if (p.dir > 0 && p.x > W + margin) p.alive = false;
      }
    }

    prizes = prizes.filter(p => p.alive);
  }

  function updateParticles() {
    if (state === "shop" && merchantSpeechTimer > 0) {
      merchantSpeechTimer--;
    }
    for (const s of shots) { s.life--; if (s.type === "shot" || s.type === "nuke") s.r += 2; }
    shots = shots.filter(s => s.life > 0);

    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += .11;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);

    for (const t of floating) { t.y += t.vy; t.life--; }
    floating = floating.filter(t => t.life > 0);

    for (const c of confetti) {
      c.x += c.vx; c.y += c.vy; c.rot += c.vr; c.life--;
    }
    confetti = confetti.filter(c => c.life > 0);
  }

  function addText(x, y, text, color) {
    floating.push({ x, y, text, color, vy: -1.1, life: 58 });
  }

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - clamp(t, 0, 1), 3);
  }

  function endedOverlayReady() {
    return state === "ended" && endOverlayAnim >= END_OVERLAY_DURATION && endOverlayInputLock <= 0;
  }

  function hitRect(x, y, rect) {
    return !!rect && x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
  }

  function returnToTitleMenuFromEnd() {
    state = "title";
    pointer.down = false;
    shake = 0;
    recoil = 0;
    shots = [];
    floating = [];

  function handleEndOverlayClick(x, y) {
    if (!endedOverlayReady()) return;
    if (hitRect(x, y, endShopRect)) {
      enterShop();
      return;
    }
    if (hitRect(x, y, endTitleRect)) {
      returnToTitleMenuFromEnd();
    }
  }

  function draw() {
    const activeShake = (state === "running" || state === "kingSpeech") ? shake : 0;
    const ox = activeShake > .5 ? rand(-activeShake, activeShake) : 0;
    const oy = activeShake > .5 ? rand(-activeShake, activeShake) : 0;

    ctx.save();
    ctx.clearRect(0, 0, W, H);
    ctx.translate(ox, oy);

    if (state === "title") {
      drawTitleScreen();
      drawShopCursor();
      ctx.restore();
      return;
    }

    if (state === "shop") {
      drawShop();
      drawEffects();
      drawShopCursor();
      ctx.restore();
      return;
    }

    if (state === "achievements") {
      drawAchievements();
      drawShopCursor();
      ctx.restore();
      return;
    }

    drawBackground();
    drawConveyor();

    const sorted = [...prizes].sort((a, b) => b.z - a.z);
    for (const p of sorted) drawPrize(p);

    drawEffects();
    drawWeapon();
    drawRoyalGuards();
    drawUI();
    drawCrosshair();

    if (state === "title") drawOverlay("游乐园奖品射击摊", "点击画面开始");
    if (state === "paused") drawOverlay("PAUSE", "游戏已暂停");
    if (state === "ended") {
      drawEndOverlay();
      drawShopCursor();
    }
    if (state === "kingSpeech") drawKingDefeatCinematic();

    ctx.restore();
  }

  function getTitleKingBounds() {
    const scale = titleKing.scale || 1;
    const w = 118 * scale;
    const h = 118 * scale;
    return { x: titleKing.x - w / 2, y: titleKing.y - 124 * scale, w, h };
  }

  function titleKingHit(x, y) {
    const b = getTitleKingBounds();
    const pad = 18;
    return x >= b.x - pad && x <= b.x + b.w + pad && y >= b.y - pad && y <= b.y + b.h + pad;
  }

  function drawTitleStageToy(type, x, y, scale = 1, rot = 0) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.scale(scale, scale);
    ctx.globalAlpha = .28;
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.ellipse(0, 10, 40, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    drawPrizeModel(type);
    ctx.restore();
  }

  function clampTitleKing() {
    const scale = titleKing.scale || 1;
    const halfW = 62 * scale;
    const topPad = 126 * scale;
    const bottomPad = 6 * scale;
    titleKing.x = clamp(titleKing.x, halfW + 20, W - halfW - 20);
    titleKing.y = clamp(titleKing.y, topPad + 12, H - bottomPad - 132);
  }

  function drawTitleKingSpeechTop() {
    if (state !== "title" || titleKing.speechTimer <= 0) return;

    const scale = titleKing.scale * (titleKing.dragging ? 1.08 : 1) * (1 + titleKing.dragPulse * 0.035);
    const bubbleW = 318;
    const bubbleH = 56;
    const bubbleX = clamp(titleKing.x - bubbleW / 2, 18, W - bubbleW - 18);
    let bubbleY = titleKing.y - 168 * scale;

    bubbleY = clamp(bubbleY, 18, H - bubbleH - 18);

    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,.35)";
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 4;

    ctx.fillStyle = "rgba(255,247,237,.98)";
    roundRect(bubbleX, bubbleY, bubbleW, bubbleH, 20, true);

    ctx.shadowColor = "transparent";
    ctx.strokeStyle = titleKing.dragging ? "rgba(202,138,4,.86)" : "rgba(124,45,18,.68)";
    ctx.lineWidth = 4;
    ctx.stroke();

    ctx.fillStyle = "#7c2d12";
    ctx.textAlign = "center";
    ctx.font = "950 22px system-ui, sans-serif";
    ctx.fillText(titleKing.speech, bubbleX + bubbleW / 2, bubbleY + 36);

    const tipX = clamp(titleKing.x, bubbleX + 42, bubbleX + bubbleW - 42);
    const tipY = bubbleY + bubbleH;
    ctx.fillStyle = "rgba(255,247,237,.98)";
    ctx.beginPath();
    ctx.moveTo(tipX - 12, tipY - 2);
    ctx.lineTo(tipX + 12, tipY - 2);
    ctx.lineTo(clamp(titleKing.x, 28, W - 28), Math.min(H - 18, titleKing.y - 112 * scale));
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = titleKing.dragging ? "rgba(202,138,4,.86)" : "rgba(124,45,18,.68)";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.restore();
  }

    roundRect(x, y, w, h, 24, true);

    ctx.stroke();

  function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, "#1e1b4b");
    sky.addColorStop(.42, "#7c2d12");
    sky.addColorStop(.72, "#111827");
    sky.addColorStop(1, "#030712");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    if (feverTimer > 0 && (state === "running" || state === "kingSpeech")) {
      ctx.globalAlpha = .16 + Math.sin(frame * .25) * .05;
      ctx.fillStyle = "#fde68a";
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    const stripeW = 88;
    for (let i = -1; i < W / stripeW + 2; i++) {
      ctx.fillStyle = i % 2 === 0 ? "rgba(248,113,113,.55)" : "rgba(255,237,213,.72)";
      ctx.beginPath();
      ctx.moveTo(W / 2, -60);
      ctx.lineTo(i * stripeW, 190);
      ctx.lineTo((i + 1) * stripeW, 190);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = "rgba(17,24,39,.72)";
    roundRect(74, 145, W - 148, 288, 26, true);
    ctx.strokeStyle = "rgba(255,255,255,.18)";

    for (let i = 0; i < 15; i++) {
      const x = 105 + i * 64;
      const y = 166 + Math.sin(frame * .03 + i) * 3;
      ctx.fillStyle = i % 2 ? "#fde68a" : "#fecaca";
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = .22;
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.fillStyle = "rgba(255,247,237,.92)";

    ctx.strokeStyle = "#7c2d12";
    ctx.lineWidth = 4;

  function drawConveyor() {
    drawBelt(lanes[2], "rgba(15,23,42,.86)");
    drawBelt(lanes[1], "rgba(30,41,59,.90)");
    drawBelt(lanes[0], "rgba(51,65,85,.95)");

    for (const lane of lanes) {
      ctx.strokeStyle = "rgba(255,255,255,.22)";
      ctx.lineWidth = 3 * lane.scale;
      ctx.beginPath();
      ctx.moveTo(80, lane.y + 4);
      ctx.lineTo(W - 80, lane.y + 4);
      ctx.stroke();

      ctx.strokeStyle = "rgba(0,0,0,.3)";
      ctx.beginPath();
      ctx.moveTo(80, lane.y + lane.h);
      ctx.lineTo(W - 80, lane.y + lane.h);
      ctx.stroke();
    }
  }

  function drawBelt(lane, fill) {
    const y = lane.y, h = lane.h;
    ctx.fillStyle = fill;
    roundRect(74, y, W - 148, h, 16 * lane.scale, true);

    ctx.save();
    ctx.beginPath();
    roundRect(74, y, W - 148, h, 16 * lane.scale, false);
    ctx.clip();

    const feverBelt = feverTimer > 0 && (state === "running" || state === "kingSpeech") ? 2.15 : 1;
    const offset = (frame * lane.speed * .035 * feverBelt) % 80;
    ctx.strokeStyle = "rgba(255,255,255,.12)";
    ctx.lineWidth = 2;
    for (let x = -100 + offset; x < W + 100; x += 80) {
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + 42, y + h);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawPrize(p) {
    const box = getPrizeBox(p);
    ctx.save();

    const bob = p.fall > 0 ? 0 : Math.sin(p.wobble) * 5 * p.scale;
    ctx.translate(p.x, p.y + bob);
    ctx.rotate(p.rot);
    ctx.scale(p.scale, p.scale);

    ctx.globalAlpha = p.fall > 0 ? .16 : .34;
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.ellipse(0, 8 / p.scale, 40, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    const type = getVisualType(p);
    if (p.king && !p.disguised) drawKingToy(p.kingCinematic ? (kingCinematic && kingCinematic.mode === "shopTheft" ? "cry" : "cry") : "cold");
    else drawPrizeModel(type);

    ctx.restore();

    if (p.fall <= 0) {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,.42)";
      roundRect(box.x + box.w / 2 - 44, box.y + box.h + 5, 88, 22, 10, true);
      ctx.fillStyle = "rgba(255,255,255,.9)";
      ctx.font = Math.max(10, 12 * p.scale) + "px ui-monospace, Menlo, Consolas, monospace";
      ctx.textAlign = "center";
      const label = p.king && p.disguised ? ((p.disguiseBase || p.base) + "分") : (p.king ? "国王!" : (p.base + "分"));
      ctx.fillText(label, box.x + box.w / 2, box.y + box.h + 20);
      ctx.restore();
    }
  }

  function drawPrizeModel(type) {
    if (type === "bear") drawBear();
    else if (type === "duck") drawDuck();
    else if (type === "ball") drawBall();
    else if (type === "robot") drawRobot();
    else if (type === "star") drawStar();
    else if (type === "crown") drawCrown();
    else drawBear();
  }

    ctx.fillStyle = "#fef3c7"; circle(0, -70, 16);
    ctx.fillStyle = "#111827"; circle(-11, -82, 4); circle(11, -82, 4); roundRect(-6, -72, 12, 7, 4, true);
    ctx.strokeStyle = "#111827"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, -63, 9, 0, Math.PI); ctx.stroke();
    ctx.fillStyle = "#a16207"; circle(-39, -22, 14); circle(39, -22, 14); circle(-20, 7, 15); circle(20, 7, 15);
  }

  function drawDuck() {
    ctx.fillStyle = "#facc15"; circle(-8, -36, 34); circle(20, -66, 24);
    ctx.fillStyle = "#fb923c"; ctx.beginPath(); ctx.moveTo(42, -66); ctx.lineTo(70, -58); ctx.lineTo(42, -50); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#111827"; circle(28, -73, 4);
    ctx.fillStyle = "#fde68a"; ctx.beginPath(); ctx.ellipse(-18, -33, 20, 12, -.55, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = "#111827"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, -70); ctx.lineTo(0, -6); ctx.stroke();
  }

  function drawRobot() {
    ctx.fillStyle = "#cbd5e1"; roundRect(-30, -88, 60, 44, 8, true);
    ctx.fillStyle = "#94a3b8"; roundRect(-38, -46, 76, 52, 10, true);

      } else if (s.type === "slash") {

        ctx.beginPath(); ctx.moveTo(s.dir > 0 ? s.x1 : s.x2, s.y); ctx.lineTo(s.dir > 0 ? s.x2 : s.x1, s.y); ctx.stroke();
      } else if (s.type === "arcLine") {
        ctx.strokeStyle = "#e9d5ff"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
      } else if (s.type === "arcRay") {
        ctx.strokeStyle = "#c4b5fd"; ctx.lineWidth = 4;

      } else if (s.type === "guard") {
        ctx.strokeStyle = "#fde68a"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
      } else {
        ctx.strokeStyle = "#fff7ed"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = clamp(a, 0, 1) * .45;

      ctx.lineWidth = 2 * scale;
      ctx.beginPath();
      ctx.arc(x + dx, y + dy, r + 3 * scale, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();

  function handleShopClick(x, y) {
    const hitKing = shopKingHit(x, y);

    if (shopStartRect && x >= shopStartRect.x && x <= shopStartRect.x + shopStartRect.w && y >= shopStartRect.y && y <= shopStartRect.y + shopStartRect.h) {
      reset();
      return;
    }

    if (debt > 0 && hitKing) {
      repayDebt();
      return;
    }

    if (secretShopMode) {
      if (shopSecretRect && x >= shopSecretRect.x && x <= shopSecretRect.x + shopSecretRect.w && y >= shopSecretRect.y && y <= shopSecretRect.y + shopSecretRect.h) {
        secretShopMode = false;
        shopHeadlineClicks = 0;
        setMerchantSpeech("回大奖商店。小秘密概不退货。", "cold", 190);
        playSfx("buy");
        return;
      }
      if (debt > 0) {
        debtAnger();
        return;
      }
      if (secretDrawRect && x >= secretDrawRect.x && x <= secretDrawRect.x + secretDrawRect.w && y >= secretDrawRect.y && y <= secretDrawRect.y + secretDrawRect.h) {
        buyRandomSecretNote();
        return;
      }
      if (hitKing) {
        setMerchantSpeech("纸条呢？没有纸条，我为什么要白说。", "cold", 200);
        playSfx("bad");
        return;
      }
      return;
    }

    if (shopHeadlineRect && x >= shopHeadlineRect.x && x <= shopHeadlineRect.x + shopHeadlineRect.w && y >= shopHeadlineRect.y && y <= shopHeadlineRect.y + shopHeadlineRect.h) {
      if (!allShopItemsCollected()) {
        setMerchantSpeech("先把商店里的东西都买完。国王的秘密不便宜。", "angry", 210);
        playSfx("bad");
        return;
      }
      shopHeadlineClicks++;
      if (shopHeadlineClicks >= 20) {
        secretShopMode = true;
        shopHeadlineClicks = 0;
        secretDrawPrice = rollSecretPrice();
        saveProgress();
        setMerchantSpeech("欢迎光临小祥超市。第一格抽纸条，价格看我的心情。", "deal", 260);
        playSfx("buy");
      } else {
        setMerchantSpeech("还差 " + (20 - shopHeadlineClicks) + " 次。小祥超市没有门牌。", shopHeadlineClicks > 14 ? "deal" : "cold", 130);
      }
      return;
    }

    for (const r of shopRects) {
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        if (debt > 0 && !owned[r.id]) {
          debtAnger();
          return;
        }
        buyOrEquip(r.id);
        return;
      }
    }

    if (debt > 0) {
      debtAnger();
      return;
    }

    if (shopSecretRect && x >= shopSecretRect.x && x <= shopSecretRect.x + shopSecretRect.w && y >= shopSecretRect.y && y <= shopSecretRect.y + shopSecretRect.h) {
      if (allWeaponsCollected()) openAchievements();
      else {
        setMerchantSpeech("不！要！", "angry", 190);
        playSfx("bad");
      }
      return;
    }

    if (hitKing) {
      setMerchantSpeech("别戳国王。你很烦，真的很烦。", "angry", 180);
      playSfx("bad");
      return;
    }
  }

  function buyRandomSecretNote() {
    if (!allShopItemsCollected()) {
      setMerchantSpeech("先把大奖商店买空。", "angry", 180);
      playSfx("bad");
      return;
    }
    if (secretNotes.length >= 7) {
      setMerchantSpeech("纸条都摆满了，先拿去问我。", "angry", 190);
      playSfx("bad");
      return;
    }
    const candidates = hiddenSecretCandidates();
    if (!candidates.length) {
      setMerchantSpeech("现在没有可抽的纸条。", "cold", 180);
      playSfx("bad");
      return;
    }
    if (tickets < secretDrawPrice) {
      setMerchantSpeech("彩票不够。小祥超市不赊账，心情价是 " + secretDrawPrice.toLocaleString("zh-CN") + "。", "angry", 230);
      playSfx("bad");
      return;
    }
    tickets -= secretDrawPrice;
    const id = candidates[Math.floor(Math.random() * candidates.length)];
    secretNotes.push(id);
    const oldPrice = secretDrawPrice;
    secretDrawPrice = rollSecretPrice();
    saveProgress();
    const secret = privateSecretById(id);
    addText(W / 2, 160, "买到纸条：" + (secret ? secret.q : "？？？？？"), "#fde68a");
    setMerchantSpeech("成交。刚才这张 " + oldPrice.toLocaleString("zh-CN") + " 彩票，下一张价格重新看心情。", "deal", 230);
    playSfx("buy");
  }

    if (!secretShopMode || !secretNoteRects.length) return false;
    for (let i = secretNoteRects.length - 1; i >= 0; i--) {
      const r = secretNoteRects[i];
      if (!r.id) continue;
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        draggedSecretNote = { id: r.id, index: r.index, offsetX: x - r.x, offsetY: y - r.y };
        setMerchantSpeech("拖给我。纸条只读一次。", "cold", 120);
        return true;
      }
    }
    return false;

  function dropSecretNote() {
    if (!draggedSecretNote) return;
    const id = draggedSecretNote.id;
    const noteIndex = draggedSecretNote.index;
    draggedSecretNote = null;
    if (!shopKingHit(pointer.x, pointer.y)) {
      setMerchantSpeech("没递到我手里，不算。", "angry", 140);
      playSfx("bad");
      return;
    }
    const secret = privateSecretById(id);
    if (Number.isInteger(noteIndex) && secretNotes[noteIndex] === id) {
      secretNotes.splice(noteIndex, 1);
    } else {
      const fallbackIndex = secretNotes.indexOf(id);
      if (fallbackIndex >= 0) secretNotes.splice(fallbackIndex, 1);
    }
    if (secret) {
      revealedSecrets[id] = true;
      saveProgress();
      addText(W / 2, 160, "揭示秘密：" + secret.q, "#bbf7d0");
      setMerchantSpeech(secret.a, "cold", 420);
      if (allPrivateSecretsRevealed()) {
        addText(W / 2, 196, "成就解锁：苦来兮苦没有秘密", "#fde68a");
      }
      playSfx("buy");
    } else {
      saveProgress();
      setMerchantSpeech("这张纸条上什么也没有。", "angry", 180);
      playSfx("bad");
    }
  }

  function wrapLeftText(text, x, y, maxWidth, lineHeight, maxLines = 3) {
    let line = "";
    let lines = 0;
    for (const ch of text) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, y);
        y += lineHeight;
        lines++;
        line = ch;
        if (lines >= maxLines - 1) break;
      } else {
        line = test;
      }
    }
    if (line && lines < maxLines) {
      ctx.fillText(line, x, y);
      y += lineHeight;
    }
    return y;
  }

  function wrapCenteredText(text, cx, y, maxWidth, lineHeight, maxLines) {
    let line = "";
    let lines = 0;
    for (const ch of text) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, cx, y);
        y += lineHeight;
        lines++;
        line = ch;
        if (lines >= maxLines - 1) break;
      } else {
        line = test;
      }
    }
    if (line && lines < maxLines) ctx.fillText(line, cx, y);
  }

  function wrapText(text, x, y, maxWidth, lineHeight, maxLines) {
    let line = "";
    let lines = 0;
    for (const ch of text) {
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, y);
        y += lineHeight;
        lines++;
        line = ch;
        if (lines >= maxLines - 1) break;
      } else {
        line = test;
      }
    }
    if (line && lines < maxLines) ctx.fillText(line, x, y);
  }

  function roundRect(x, y, w, h, r, fill) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    if (fill) ctx.fill(); else ctx.stroke();
  }

  function circle(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  function line(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function isMobilePortrait() {
    return !!(window.matchMedia &&

  function syncOrientationHint() {
    if (!orientationHint) return;
    orientationHint.style.display = isMobilePortrait() ? 'flex' : 'none';
  }

  function hideFullscreenGate() {
    if (!fullscreenGate) return;
    fullscreenGate.classList.remove('show');
    fullscreenGate.style.display = 'none';
  }

  let landscapeLockTried = false;
  async function requestLandscapeLock() {
    if (landscapeLockTried) return;
    landscapeLockTried = true;
    try {
      if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      }
    } catch {}
    try {
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock("landscape");
      }
    } catch {}
  }

  function canvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.clientX ?? (e.touches && e.touches[0]?.clientX) ?? W / 2;
    const clientY = e.clientY ?? (e.touches && e.touches[0]?.clientY) ?? H / 2;
    return {
      x: (clientX - rect.left) * (canvas.width / rect.width),
      y: (clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  window.addEventListener("orientationchange", syncOrientationHint);
  document.addEventListener("fullscreenchange", () => {
    if (document.fullscreenElement) hideFullscreenGate();
  });
  syncOrientationHint();

  fullscreenBtn?.addEventListener("pointerdown", async e => {
    e.preventDefault();
    e.stopPropagation();
    await requestLandscapeLock();
    hideFullscreenGate();
  });

  fullscreenGate?.addEventListener("pointerdown", async () => {
    await requestLandscapeLock();
    hideFullscreenGate();
  });

  orientationHint?.addEventListener("pointerdown", () => {
    requestLandscapeLock();
  });

  canvas.addEventListener("pointermove", e => {
    const p = canvasPos(e);
    pointer.x = clamp(p.x, 0, W);
    pointer.y = clamp(p.y, 0, H);
    if (state === "achievements" && (achDragScroll || achDragPending) && pointer.down) {
      if (achDragPending) {
        achDragScroll = true;
        achDragPending = false;
      }
      achScroll = clamp(achScroll + (achDragLastY - pointer.y), 0, achScrollMax);
      achDragLastY = pointer.y;
      return;
    }

    if (state === "achievements" && achDragScroll) {
      achDragScroll = false;
      pointer.down = false;
      return;
    }

    if (state === "shop" && draggedSecretNote) {
      return;
    }

    if (state === "title" && titleKing.dragging) {
      titleKing.x = pointer.x - titleKing.offsetX;
      titleKing.y = pointer.y - titleKing.offsetY;
      titleKing.dragPulse = Math.min(1, titleKing.dragPulse + 0.18);
      titleKing.speechTimer = Math.max(titleKing.speechTimer, 70);
      clampTitleKing();
    }
  });

  canvas.addEventListener("pointerdown", e => {
    requestLandscapeLock();
    const p = canvasPos(e);
    pointer.x = clamp(p.x, 0, W);
    pointer.y = clamp(p.y, 0, H);

    if (e.button === 2) {
      e.preventDefault();
      pointer.down = false;
      if (state === "kingSpeech") accelerateKingSpeech();
      return;
    }

    pointer.down = true;

    if (state === "kingSpeech") {
      return;
    }

    if (state === "achievements" && pointer.x >= 302 && pointer.x <= 787 && pointer.y >= 126 && pointer.y <= 528) {
      achDragScroll = false;
      achDragPending = true;
      achDragLastY = pointer.y;
    }

    if (state === "shop" && startSecretNoteDrag(pointer.x, pointer.y)) {
      return;
    }

    if (state === "title" && !titleDialog && titleKingHit(pointer.x, pointer.y)) {
      titleKing.dragging = true;
      titleKing.offsetX = pointer.x - titleKing.x;
      titleKing.offsetY = pointer.y - titleKing.y;
      titleKing.mood = "angry";
      titleKing.speech = Math.random() < .5 ? "你干嘛～嗨嗨～哎呦～" : "国王，移动。";
      titleKing.speechTimer = 310;
      titleKing.dragSpeechTimer = 300;
      titleKing.dragPulse = 1;
      return;
    }

    if (state === "running" && weapon === "arc" && feverTimer <= 0) {
      arcDrag = { sx: pointer.x, sy: pointer.y };
      return;
    }

    shoot();
  });

  canvas.addEventListener("pointerup", () => {
    if (state === "kingSpeech") {
      pointer.down = false;
      return;
    }

    if (state === "shop" && draggedSecretNote) {
      dropSecretNote();
      pointer.down = false;
      return;
    }

    if (state === "title" && titleKing.dragging) {
      titleKing.dragging = false;
      titleKing.mood = "cold";
      titleKing.dragPulse = 0.45;
      titleKing.speechTimer = 0;
      titleKing.dragSpeechTimer = 0;
      pointer.down = false;
      return;
    }

    if (state === "running" && weapon === "arc" && feverTimer <= 0 && arcDrag) {
      fireArcManual(arcDrag.sx, arcDrag.sy, pointer.x, pointer.y);
      arcDrag = null;
    }
    pointer.down = false;
    marsAutoCooldown = 0;
  });

  canvas.addEventListener("wheel", e => {
    // disabled: strict drag-only scrolling
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener("contextmenu", e => {
    e.preventDefault();
    if (state === "kingSpeech") accelerateKingSpeech();
  });

  window.addEventListener("keydown", e => {
    if (["KeyM", "Space"].includes(e.code)) e.preventDefault();
    if (!keys[e.code]) {
      if (e.code === "KeyM") toggleMusic();
      if (e.code === "Space") {
        if (state === "title") {
          if (!titleDialog) reset();
        }
        else if (state === "ended") { if (endedOverlayReady()) enterShop(); }
        else if (state === "shop") reset();
        else if (state === "achievements") enterShop();
        else if (state === "kingSpeech") accelerateKingSpeech();
        else shoot();
      }
      if (e.code === "Escape" && state === "title" && titleDialog) closeTitleDialog();
      if (e.code === "Enter" && state === "title" && titleDialog) confirmTitleDialog();
    }
    keys[e.code] = true;
  });

  window.addEventListener("keyup", e => keys[e.code] = false);

  if (startBtn) startBtn.addEventListener("click", reset);
  if (pauseBtn) pauseBtn.addEventListener("click", togglePause);

  if (easyBtn) easyBtn.addEventListener("click", () => {
    difficulty = "easy";
    if (easyBtn) easyBtn.textContent = "轻松模式 ✓";
    if (hardBtn) hardBtn.textContent = "挑战模式";
    addText(W / 2, 150, "轻松模式", "#bbf7d0");
    if (state === "running") reset();
  });

  if (hardBtn) hardBtn.addEventListener("click", () => {
    difficulty = "hard";
    if (hardBtn) hardBtn.textContent = "挑战模式 ✓";
    if (easyBtn) easyBtn.textContent = "轻松模式";
    addText(W / 2, 150, "挑战模式", "#fecaca");
    if (state === "running") reset();
  });

  if (musicBtn) musicBtn.addEventListener("click", toggleMusic);

  function toggleMusic() {
    musicOn = !musicOn;
    loadKingSprites();
    if (musicBtn) musicBtn.textContent = "音乐：" + (musicOn ? "开" : "关");
    saveProgress();
    if (musicOn) startMusic();
    else stopMusic();
  }

  function ensureAudio() {
    if (!musicOn) return false;
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return true;
    } catch {
      musicOn = false;
      if (musicBtn) musicBtn.textContent = "音乐：不可用";
      return false;
    }
  }

  function startMusic() {
    if (!musicOn || musicTimer) return;
    if (!ensureAudio()) return;
    musicTimer = setInterval(playMusicStep, 260);
  }

  function stopMusic() {
    if (musicTimer) clearInterval(musicTimer);
    musicTimer = null;
  }

  function playTone(freq, dur, type, vol, delay = 0) {
    if (!ensureAudio()) return;
    const now = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(vol, now + .015);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + dur + .03);
  }

  function playSfx(kind) {
    if (!ensureAudio()) return;
    const now = audioCtx.currentTime;

    function blip(freq, dur, type, vol, when = 0, endFreq = null) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now + when);
      if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, now + when + dur);
      gain.gain.setValueAtTime(0.0001, now + when);
      gain.gain.exponentialRampToValueAtTime(vol, now + when + .008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + when + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now + when);
      osc.stop(now + when + dur + .03);
    }

    if (kind === "shoot") {
      blip(520, .055, "square", .045, 0, 180);
    } else if (kind === "hit") {
      blip(760, .06, "triangle", .04, 0);
      blip(980, .045, "square", .028, .04);
    } else if (kind === "dodge") {
      blip(920, .08, "sawtooth", .026, 0, 420);
    } else if (kind === "nuke") {
      blip(110, .22, "sawtooth", .06, 0, 55);
      blip(440, .12, "square", .035, .04, 90);
    } else if (kind === "swing") {
      blip(330, .11, "sawtooth", .035, 0, 740);
    } else if (kind === "tick") {
      blip(880, .025, "triangle", .018, 0);
    } else if (kind === "buy") {
      blip(523, .08, "triangle", .035, 0);
      blip(659, .08, "triangle", .035, .08);
      blip(784, .11, "triangle", .04, .16);
    } else if (kind === "bad") {
      blip(180, .13, "square", .04, 0, 120);
    }
  }

  function playMusicStep() {
    const shopBoost = state === "shop" ? 1.62 : 1.0;
    const feverBoost = feverTimer > 0 ? 1.08 : 1.0;
    const vol = shopBoost * feverBoost;

    const scale = {
      1: 493.88, 2: 554.37, 3: 622.25, 4: 659.25,
      5: 739.99, 6: 830.61, 7: 932.33, 11: 987.77
    };
    const bassScale = {
      1: 123.47, 2: 138.59, 3: 155.56, 4: 164.81,
      5: 185.00, 6: 207.65
    };

    const phraseMelody = [3, null, 2, 1, null, 2, 3, null, "43", 2, null, 0];
    const phraseDur =    [.56,0,    .15,.50,0,    .15,.50,0,    .16,  .56,0,    0];
    const melody = phraseMelody.concat(phraseMelody, phraseMelody, phraseMelody);
    const dur = phraseDur.concat(phraseDur, phraseDur, phraseDur);

    const bass1 = [1, 0, 5, 0, 4, 0, 5, 0, 3, 0, 5, 0];
    const bass2 = [1, 0, 6, 0, 4, 0, 5, 0, 3, 0, 5, 0];
    const bass3 = [1, 0, 5, 0, 4, 0, 6, 0, 3, 0, 2, 0];
    const bass4 = [1, 0, 5, 0, 4, 0, 5, 0, 3, 0, 1, 0];
    const bass = bass1.concat(bass2, bass3, bass4);

    const harm1 = [5, 0, 0, 0, 3, 0, 0, 5, 0, 6, 0, 0];
    const harm2 = [5, 0, 4, 0, 3, 0, 0, 5, 0, 6, 0, 0];
    const harm3 = [5, 0, 4, 0, 3, 0, 0, 11,0, 6, 0, 0];
    const harm4 = [5, 0, 4, 0, 3, 0, 0, 5, 0, 6, 5, 0];
    const harmony = harm1.concat(harm2, harm3, harm4);

    const counter1 = [0, 0, 5, 0, 0, 3, 0, 0, 5, 0, 0, 3];
    const counter2 = [0, 0, 4, 0, 0, 3, 0, 0, 4, 0, 0, 3];
    const counter3 = [0, 0, 5, 0, 0, 4, 0, 0, 5, 0, 0, 4];
    const counter4 = [0, 0, 4, 0, 0, 3, 0, 0, 4, 0, 0, 3];
    const countermelody = counter1.concat(counter2, counter3, counter4);

    const i = musicStep % melody.length;
    const stepInPhrase = i % phraseMelody.length;
    const phraseIndex = Math.floor(i / phraseMelody.length);
    const m = melody[i];
    const h = harmony[i];
    const b = bass[i];
    const c = countermelody[i];

    if (m === "43") {
      playTone(scale[4], .072, "square", .023 * vol);
      playTone(scale[3], .078, "square", .022 * vol, .128);
    } else if (m) {
      playTone(scale[m], dur[i] || .12, "square", .024 * vol);
    }
    if (h) playTone(scale[h], .062, "square", (0.0058 + phraseIndex * 0.0007) * vol);
    if (b) playTone(bassScale[b], .110, "triangle", .020 * vol);
    if (c) playTone(scale[c] * 2, .040, "triangle", .0042 * vol);

    if (stepInPhrase === 0) playTone(82.41, .022, "square", .0065 * vol);
    if (stepInPhrase === 6) playTone(61.74, .018, "square", .0046 * vol);

    if (m === 2 && stepInPhrase === 10 && phraseIndex === 3) {
      playTone(scale[m] * 2, .040, "triangle", .0040 * vol);
    }

    musicStep++;
  }

  function loop(t) {
    if (!lastTime) lastTime = t;
    const dt = Math.min(34, t - lastTime);
    lastTime = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  loadKingSprites();
  if (musicBtn) musicBtn.textContent = "音乐：" + (musicOn ? "开" : "关");
  draw();
  requestAnimationFrame(loop);
})();</script>
